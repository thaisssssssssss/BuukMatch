<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mensagens</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            width: 900px;
            min-height: 600px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: #f4f5fb;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        .main {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 7px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #5366d6;
        }

        .secundario {
            background: #764ba2;
        }

        .danger {
            background: #d9534f;
        }

        .hidden {
            display: none;
        }

        .User-logado {
            background: #e6e9ff;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .chat-card {
            background: #f8f8ff;
            border: 1px solid #ddd;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .chat-card h3 {
            margin-bottom: 5px;
            color: #4b4b8f;
        }

        .Message {
            background: #667eea;
            color: white;
            padding: 10px 14px;
            border-radius: 14px;
            margin: 8px 0;
            max-width: 80%;
        }

        .vazio {
            color: #777;
            font-style: italic;
        }

        .linha {
            display: flex;
            gap: 10px;
        }

        .linha input {
            flex: 1;
        }

        .linha button {
            width: 160px;
        }

        #listaChats {
            margin-top: 20px;
            overflow-y: auto;
        }

        small {
            color: #666;
        }
    </style>
</head>

<body>

<div class="app">

    <div class="sidebar">
        <h2>Minha Conta</h2>

        <div id="areaLogin">
            <h3>Login</h3>
            <input id="loginEmail" placeholder="E-mail">
            <input id="loginSenha" type="password" placeholder="Senha">
            <button onclick="login()">Entrar</button>

            <hr>

            <h3>Cadastrar</h3>
            <input id="cadNome" placeholder="Nome">
            <input id="cadEmail" placeholder="E-mail">
            <input id="cadSenha" type="password" placeholder="Senha">
            <button class="secundario" onclick="cadastrar()">Cadastrar</button>
        </div>

        <div id="areaUser" class="hidden">
            <div class="User-logado">
                <strong>Usuário logado:</strong>
                <p id="nomeUser"></p>
                <small id="emailUser"></small>
            </div>

            <button onclick="carregarChats()">Atualizar chats</button>
            <button class="danger" onclick="sair()">Sair</button>
        </div>
    </div>

    <div class="main">
        <h1>Sistema de Mensagens</h1>

        <div id="conteudoLogado" class="hidden">
            <h3>Criar novo chat</h3>
            <div class="linha">
                <input id="novoReceptor" placeholder="Nome do contato/receptor">
                <button onclick="criarChat()">Criar</button>
            </div>

            <h3>Enviar Message</h3>
            <div class="linha">
                <input id="receptorMessage" placeholder="Contato">
                <input id="conteudoMessage" placeholder="Message">
                <button onclick="enviarMessage()">Enviar</button>
            </div>

            <div id="listaChats"></div>
        </div>

        <div id="conteudoDeslogado">
            <p class="vazio">Faça login ou cadastre-se para visualizar seus chats.</p>
        </div>
    </div>

</div>

<script>
    let UserLogado = JSON.parse(localStorage.getItem("UserLogado"));

    function atualizarTela() {
        const areaLogin = document.getElementById("areaLogin");
        const areaUser = document.getElementById("areaUser");
        const conteudoLogado = document.getElementById("conteudoLogado");
        const conteudoDeslogado = document.getElementById("conteudoDeslogado");

        if (UserLogado) {
            areaLogin.classList.add("hidden");
            areaUser.classList.remove("hidden");
            conteudoLogado.classList.remove("hidden");
            conteudoDeslogado.classList.add("hidden");

            document.getElementById("nomeUser").innerText = UserLogado.nome;
            document.getElementById("emailUser").innerText = UserLogado.email;

            carregarChats();
        } else {
            areaLogin.classList.remove("hidden");
            areaUser.classList.add("hidden");
            conteudoLogado.classList.add("hidden");
            conteudoDeslogado.classList.remove("hidden");
        }
    }

    async function cadastrar() {
        const nome = document.getElementById("cadNome").value.trim();
        const email = document.getElementById("cadEmail").value.trim();
        const senha = document.getElementById("cadSenha").value.trim();

        if (!nome || !email || !senha) {
            alert("Preencha nome, e-mail e senha.");
            return;
        }

        const resposta = await fetch("/cadastrar", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ nome, email, senha })
        });

        if (!resposta.ok) {
            alert("Erro ao cadastrar usuário.");
            return;
        }

        alert("Cadastro realizado! Agora faça login.");
    }

    async function login() {
        const email = document.getElementById("loginEmail").value.trim();
        const senha = document.getElementById("loginSenha").value.trim();

        if (!email || !senha) {
            alert("Digite e-mail e senha.");
            return;
        }

        const resposta = await fetch(`/login/${encodeURIComponent(email)}/${encodeURIComponent(senha)}`, {
            method: "POST"
        });

        if (!resposta.ok) {
            alert("Erro ao fazer login.");
            return;
        }

        const User = await resposta.json();

        if (!User) {
            alert("E-mail ou senha incorretos.");
            return;
        }

        UserLogado = User;
        localStorage.setItem("UserLogado", JSON.stringify(UserLogado));

        atualizarTela();
    }

    function sair() {
        UserLogado = null;
        localStorage.removeItem("UserLogado");
        atualizarTela();
    }

    async function criarChat() {
        const receptor = document.getElementById("novoReceptor").value.trim();

        if (!receptor) {
            alert("Digite o nome do contato.");
            return;
        }

        const email = UserLogado.email;

        const resposta = await fetch(`/chat/${encodeURIComponent(email)}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ receptor })
        });

        if (!resposta.ok) {
            alert("Erro ao criar chat.");
            return;
        }

        document.getElementById("novoReceptor").value = "";
        carregarChats();
    }

    async function enviarMessage() {
        const receptor = document.getElementById("receptorMessage").value.trim();
        const conteudo = document.getElementById("conteudoMessage").value.trim();

        if (!receptor || !conteudo) {
            alert("Digite o contato e a Message.");
            return;
        }

        const email = UserLogado.email;

        const resposta = await fetch(`/chat/${encodeURIComponent(receptor)}/${encodeURIComponent(email)}/texto`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ conteudo })
        });

        if (!resposta.ok) {
            alert("Erro ao enviar Message. Verifique se o chat existe.");
            return;
        }

        document.getElementById("conteudoMessage").value = "";
        carregarChats();
    }

    async function carregarChats() {
        if (!UserLogado) return;

        const email = UserLogado.email;

        const resposta = await fetch(`/chat/${encodeURIComponent(email)}`);

        if (!resposta.ok) {
            alert("Erro ao carregar chats.");
            return;
        }

        const chats = await resposta.json();
        const lista = document.getElementById("listaChats");

        lista.innerHTML = "";

        if (!chats || chats.length === 0) {
            lista.innerHTML = "<p class='vazio'>Nenhum chat criado ainda.</p>";
            return;
        }

        chats.forEach(chat => {
            let mensagensHtml = "";

            if (!chat.mensagens || chat.mensagens.length === 0) {
                mensagensHtml = "<p class='vazio'>Nenhuma Message enviada.</p>";
            } else {
                chat.mensagens.forEach(msg => {
                    mensagensHtml += `<div class="Message">${msg.conteudo}</div>`;
                });
            }

            lista.innerHTML += `
                <div class="chat-card">
                    <h3>${chat.receptor}</h3>
                    <small>Criado em: ${chat.horario || "sem horário"}</small>
                    <h4>Mensagens</h4>
                    ${mensagensHtml}
                </div>
            `;
        });
    }

    atualizarTela();
</script>

</body>
</html>
