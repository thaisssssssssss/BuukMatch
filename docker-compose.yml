services:
  backend:
    build:
      context: ./trabalho
      dockerfile: Dockerfile
    container_name: buukmatch-backend
    ports:
      - "8080:8080"
    volumes:
      - buukmatch-h2-data:/app/db
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:file:/app/db/trabalhodb
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: buukmatch-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  buukmatch-h2-data:
  frontend_node_modules:
